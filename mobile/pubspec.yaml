name: zk_auth
description: "ZK-Auth — Zero-Knowledge DigiLocker for MANIT"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  bloc: ^8.1.4

  # HTTP + networking
  dio: ^5.4.3+1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # WebSocket
  web_socket_channel: ^3.0.0

  # Navigation
  go_router: ^14.1.4

  # QR code generation (display QR on screen)
  qr_flutter: ^4.1.0

  # QR code scanning (camera-based scanner)
  mobile_scanner: ^5.2.3

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utilities
  uuid: ^4.4.0
  crypto: ^3.0.3
  convert: ^3.1.1
  intl: ^0.19.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  open_filex: ^4.4.1

  # UI
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  sqflite: ^2.4.2+1
  path: ^1.9.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/circuits/
    - assets/images/
